databaseChangeLog:
  - changeSet:
      id: 003-usuario
      author: comercialcloud
      changes:
        - createTable:
            tableName: usuario
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_tenant
                    references: tenant(id)
              - column:
                  name: nome
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_usuario_tenant_id
            tableName: usuario
            columns:
              - column:
                  name: tenant_id
        - addUniqueConstraint:
            tableName: usuario
            columnNames: tenant_id, email
            constraintName: uk_usuario_tenant_email

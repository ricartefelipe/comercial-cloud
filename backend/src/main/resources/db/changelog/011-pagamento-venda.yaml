databaseChangeLog:
  - changeSet:
      id: 011-pagamento-venda
      author: comercialcloud
      changes:
        - createTable:
            tableName: pagamento_venda
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pagamento_venda_tenant
                    references: tenant(id)
              - column:
                  name: venda_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pagamento_venda_venda
                    references: venda(id)
              - column:
                  name: forma_pagamento
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: valor
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_pagamento_venda_tenant_id
            tableName: pagamento_venda
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            indexName: idx_pagamento_venda_venda_id
            tableName: pagamento_venda
            columns:
              - column:
                  name: venda_id

databaseChangeLog:
  - changeSet:
      id: 013-auditoria
      author: comercialcloud
      changes:
        - createTable:
            tableName: auditoria
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_auditoria_tenant
                    references: tenant(id)
              - column:
                  name: entidade
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: entidade_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: acao
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: usuario_id
                  type: UUID
              - column:
                  name: detalhes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_auditoria_tenant_id
            tableName: auditoria
            columns:
              - column:
                  name: tenant_id

databaseChangeLog:
  - changeSet:
      id: 015-configuracao
      author: comercialcloud
      changes:
        - createTable:
            tableName: configuracao
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_configuracao_tenant
                    references: tenant(id)
              - column:
                  name: loja_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_configuracao_loja
                    references: loja(id)
              - column:
                  name: chave
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: valor
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_configuracao_tenant_id
            tableName: configuracao
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            indexName: idx_configuracao_loja_id
            tableName: configuracao
            columns:
              - column:
                  name: loja_id
        - addUniqueConstraint:
            tableName: configuracao
            columnNames: tenant_id, loja_id, chave
            constraintName: uk_configuracao_tenant_loja_chave

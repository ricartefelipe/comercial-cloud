services:
  postgres:
    image: postgres:16-alpine
    container_name: comercialcloud-postgres
    environment:
      POSTGRES_DB: comercialcloud
      POSTGRES_USER: comercialcloud
      POSTGRES_PASSWORD: comercialcloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comercialcloud -d comercialcloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: comercialcloud-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/comercialcloud
      KC_DB_USERNAME: comercialcloud
      KC_DB_PASSWORD: comercialcloud
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - keycloak

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comercialcloud-backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/comercialcloud
      QUARKUS_DATASOURCE_USERNAME: comercialcloud
      QUARKUS_DATASOURCE_PASSWORD: comercialcloud
      QUARKUS_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: comercialcloud-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
